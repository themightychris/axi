<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1440, height=1210" />
    <title>Multi-Page Comparison Race | AXI</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      :root {
        --bg: #ff4736;
        --panel: rgba(255, 252, 246, 0.82);
        --panel-strong: rgba(255, 252, 246, 0.94);
        --text: #171411;
        --muted: #6b645b;
        --border: rgba(23, 20, 17, 0.1);
        --shadow: 0 28px 60px rgba(57, 43, 22, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 1440px;
        height: 1210px;
        overflow: hidden;
      }

      body {
        color: var(--text);
        font-family:
          "EB Garamond", "Iowan Old Style", "Palatino Linotype", "Book Antiqua",
          Palatino, Georgia, serif;
        background:
          radial-gradient(
            circle at 10% 10%,
            rgba(255, 246, 235, 0.2),
            transparent 24%
          ),
          radial-gradient(
            circle at 90% 14%,
            rgba(123, 20, 20, 0.18),
            transparent 26%
          ),
          linear-gradient(180deg, #ff6a52 0%, var(--bg) 100%);
      }

      [data-composition-id="main"] {
        width: 1440px;
        height: 1210px;
      }

      .poster {
        width: 1440px;
        height: 1210px;
        margin: 0;
        padding: 24px;
      }

      .frame {
        position: relative;
        border-radius: 32px;
        border: 1px solid rgba(255, 255, 255, 0.5);
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.6),
          rgba(255, 251, 244, 0.78)
        );
        backdrop-filter: blur(18px);
        box-shadow: var(--shadow);
        padding: 26px;
        min-height: calc(1210px - 48px);
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--muted);
        font-family:
          "JetBrains Mono", ui-monospace, "SFMono-Regular", "SF Mono", Menlo,
          Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .task {
        margin: 0 0 14px;
        padding: 10px 0 14px;
        font-size: 34px;
        font-weight: 700;
        line-height: 0.98;
        letter-spacing: -0.03em;
      }

      .lanes {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
      }

      .lane {
        display: flex;
        flex-direction: column;
        min-height: 620px;
        border-radius: 26px;
        border: 1px solid var(--border);
        background: var(--panel);
        padding: 18px;
        position: relative;
        overflow: hidden;
      }

      .lane::before {
        content: "";
        position: absolute;
        inset: 0 auto 0 0;
        width: 8px;
        background: var(--lane-color);
      }

      .lane-head {
        margin-bottom: 12px;
      }

      .lane-label {
        margin: 0;
        font-family:
          "JetBrains Mono", ui-monospace, "SFMono-Regular", "SF Mono", Menlo,
          Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 34px;
        font-weight: 800;
        letter-spacing: -0.06em;
      }

      .lane-name {
        margin: 6px 0 0;
        color: var(--muted);
        font-family:
          "JetBrains Mono", ui-monospace, "SFMono-Regular", "SF Mono", Menlo,
          Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 13px;
      }

      .compact-metrics {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin-bottom: 10px;
      }

      .metric {
        padding: 10px 10px 12px;
        border-radius: 16px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.54);
      }

      .metric-label {
        display: block;
        color: var(--muted);
        font-family:
          "JetBrains Mono", ui-monospace, "SFMono-Regular", "SF Mono", Menlo,
          Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .metric-value {
        display: block;
        margin-top: 6px;
        font-size: 24px;
        line-height: 1;
        letter-spacing: -0.05em;
        font-variant-numeric: tabular-nums;
      }

      .steps {
        display: grid;
        gap: 8px;
        flex: 1;
      }

      .step {
        position: relative;
        display: grid;
        align-content: center;
        min-height: 54px;
        padding: 10px 12px 10px 14px;
        border-radius: 20px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.58);
        opacity: 0.18;
        overflow: hidden;
      }

      .step-highlight {
        position: absolute;
        inset: 0;
        border-radius: 20px;
        background: color-mix(in srgb, var(--lane-color) 12%, white);
        outline: 2px solid color-mix(in srgb, var(--lane-color) 28%, white);
        outline-offset: -2px;
        opacity: 0;
        pointer-events: none;
      }

      .step-title {
        position: relative;
        font-family:
          "JetBrains Mono", ui-monospace, "SFMono-Regular", "SF Mono", Menlo,
          Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 22px;
        font-weight: 700;
        line-height: 1;
        letter-spacing: -0.05em;
      }

      .footer {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin-top: 14px;
        color: var(--muted);
        font-family:
          "JetBrains Mono", ui-monospace, "SFMono-Regular", "SF Mono", Menlo,
          Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="46"
      data-width="1440"
      data-height="1210"
    >
      <main class="poster">
        <section class="frame">
          <p class="eyebrow">AXI Browser Benchmark</p>
          <div class="task">
            Find designer of Rust, its GitHub stars, and tagline across three
            sites.
          </div>

          <section class="lanes" id="lanes"></section>

          <div class="footer">
            <span
              >Metrics shown: Turns, total input tokens, and elapsed time.</span
            >
          </div>
        </section>
      </main>
    </div>

    <script>
      const raceData = [
        {
          label: "AXI",
          name: "chrome-devtools-axi",
          color: "#0f766e",
          metrics: { turns: 6, tokens: 72543, time: 17.7 },
          steps: [
            { title: "--help | head" },
            { title: "open --query" },
            { title: "open --query" },
            { title: "open --query" },
            { title: "snapshot --query" },
            { title: "answer" },
          ],
        },
        {
          label: "CLI",
          name: "agent-browser",
          color: "#2563eb",
          metrics: { turns: 8, tokens: 117828, time: 29.0 },
          steps: [
            { title: "--help | head" },
            { title: "open && snapshot | head" },
            { title: "open && snapshot | head" },
            { title: "open && snapshot | head" },
            { title: "open && get text" },
            { title: "eval | head" },
            { title: "eval | head" },
            { title: "answer" },
          ],
        },
        {
          label: "MCP",
          name: "chrome-devtools-mcp",
          color: "#b45309",
          metrics: { turns: 16, tokens: 342278, time: 44.8 },
          steps: [
            { title: "new_page" },
            { title: "new_page" },
            { title: "take_snapshot" },
            { title: "new_page" },
            { title: "select_page" },
            { title: "take_snapshot" },
            { title: "select_page" },
            { title: "take_snapshot" },
            { title: "select_page" },
            { title: "evaluate_script" },
            { title: "select_page" },
            { title: "evaluate_script" },
            { title: "answer" },
          ],
        },
      ];

      const introDelay = 0;
      const lanesRoot = document.getElementById("lanes");

      function formatTurns(value) {
        return `${Math.round(value)}`;
      }
      function formatTokens(value) {
        return Math.round(value).toLocaleString("en-US");
      }
      function formatTime(value) {
        return `${value.toFixed(1)}s`;
      }

      const laneEls = raceData.map((lane, laneIdx) => {
        const article = document.createElement("article");
        article.className = "lane";
        article.id = `lane-${laneIdx}`;
        article.style.setProperty("--lane-color", lane.color);
        article.innerHTML = `
          <div class="lane-head">
            <h2 class="lane-label">${lane.label}</h2>
            <div class="lane-name">${lane.name}</div>
          </div>
          <div class="compact-metrics">
            <div class="metric">
              <span class="metric-label">Turns</span>
              <span class="metric-value" data-metric="turns">0</span>
            </div>
            <div class="metric">
              <span class="metric-label">Tokens</span>
              <span class="metric-value" data-metric="tokens">0</span>
            </div>
            <div class="metric">
              <span class="metric-label">Time</span>
              <span class="metric-value" data-metric="time">0.0s</span>
            </div>
          </div>
          <div class="steps">
            ${lane.steps
              .map(
                (step, stepIdx) => `
                  <div class="step" id="lane-${laneIdx}-step-${stepIdx}">
                    <div class="step-highlight" id="lane-${laneIdx}-highlight-${stepIdx}"></div>
                    <div class="step-title">${step.title}</div>
                  </div>
                `,
              )
              .join("")}
          </div>
        `;
        lanesRoot.appendChild(article);
        return article;
      });

      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      raceData.forEach((lane, laneIdx) => {
        const laneDuration = lane.metrics.time;
        const stepDuration = laneDuration / lane.steps.length;
        const laneStart = introDelay;
        const laneEl = laneEls[laneIdx];
        const turnsEl = laneEl.querySelector('[data-metric="turns"]');
        const tokensEl = laneEl.querySelector('[data-metric="tokens"]');
        const timeEl = laneEl.querySelector('[data-metric="time"]');

        const proxy = { turns: 0, tokens: 0, time: 0 };

        tl.to(
          proxy,
          {
            turns: lane.metrics.turns,
            tokens: lane.metrics.tokens,
            time: lane.metrics.time,
            duration: laneDuration,
            ease: "none",
            onUpdate() {
              turnsEl.textContent = formatTurns(proxy.turns);
              tokensEl.textContent = formatTokens(proxy.tokens);
              timeEl.textContent = formatTime(proxy.time);
            },
          },
          laneStart,
        );

        lane.steps.forEach((step, stepIdx) => {
          const stepTime = laneStart + stepIdx * stepDuration;
          const stepSel = `#lane-${laneIdx}-step-${stepIdx}`;
          const highlightSel = `#lane-${laneIdx}-highlight-${stepIdx}`;

          tl.to(
            stepSel,
            { opacity: 1, duration: 0.28, ease: "power2.out" },
            stepTime,
          );

          tl.to(
            highlightSel,
            { opacity: 1, duration: 0.18, ease: "power2.out" },
            stepTime,
          );

          const nextTime = laneStart + (stepIdx + 1) * stepDuration;
          tl.to(
            highlightSel,
            { opacity: 0, duration: 0.22, ease: "power2.in" },
            nextTime,
          );
          tl.set(
            highlightSel,
            { opacity: 0, visibility: "hidden" },
            nextTime + 0.22,
          );
        });
      });

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
