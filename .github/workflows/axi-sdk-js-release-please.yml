name: axi-sdk-js-release-please

on:
  push:
    branches: [main]
    paths:
      - packages/axi-sdk-js/**
      - release-please-config.json
      - .release-please-manifest.json
      - .github/workflows/axi-sdk-js-release-please.yml

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs['packages/axi-sdk-js--release_created'] == 'true' }}

      - uses: pnpm/action-setup@v4
        if: ${{ steps.release.outputs['packages/axi-sdk-js--release_created'] == 'true' }}

      - uses: actions/setup-node@v6
        if: ${{ steps.release.outputs['packages/axi-sdk-js--release_created'] == 'true' }}
        with:
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile
        if: ${{ steps.release.outputs['packages/axi-sdk-js--release_created'] == 'true' }}
      - run: pnpm run format:check
        if: ${{ steps.release.outputs['packages/axi-sdk-js--release_created'] == 'true' }}
      - run: pnpm run lint
        if: ${{ steps.release.outputs['packages/axi-sdk-js--release_created'] == 'true' }}

      - run: pnpm --dir packages/axi-sdk-js run build
        if: ${{ steps.release.outputs['packages/axi-sdk-js--release_created'] == 'true' }}

      - run: pnpm --dir packages/axi-sdk-js test
        if: ${{ steps.release.outputs['packages/axi-sdk-js--release_created'] == 'true' }}

      - run: npm publish --access public --provenance
        if: ${{ steps.release.outputs['packages/axi-sdk-js--release_created'] == 'true' }}
        working-directory: packages/axi-sdk-js
