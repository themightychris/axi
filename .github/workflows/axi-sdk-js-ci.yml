name: axi-sdk-js-ci

on:
  push:
    branches: [main]
    paths:
      - package.json
      - packages/axi-sdk-js/**
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .github/workflows/axi-sdk-js-ci.yml
  pull_request:
    branches: [main]
    paths:
      - package.json
      - packages/axi-sdk-js/**
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .github/workflows/axi-sdk-js-ci.yml

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run format:check
      - run: pnpm run lint
      - run: pnpm --dir packages/axi-sdk-js run build
      - run: pnpm --dir packages/axi-sdk-js test
